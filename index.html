<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Neon Cyberpunk Market</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050510; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(0,255,200,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(0,255,200,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🌃 NEON CYBERPUNK MARKET 🏮</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.02);

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 10, 30);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.12;
controls.maxPolarAngle = Math.PI * 0.6;
controls.minDistance = 8;
controls.maxDistance = 55;

const composer = new EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.05));

scene.add(new THREE.AmbientLight(0x0a0a20, 0.3));

// Street ground with glow strips
{
  const groundGeo = new THREE.PlaneGeometry(60, 60, 60, 60);
  const groundMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      void main() {
        vec2 grid = abs(fract(vUv * 30.0) - 0.5);
        float line = smoothstep(0.03, 0.06, min(grid.x, grid.y));
        vec3 base = vec3(0.02, 0.02, 0.05);
        vec3 lineCol = vec3(0.0, 0.8, 1.0) * (0.5 + 0.5 * sin(uTime * 0.5 + vUv.y * 10.0));
        vec3 col = mix(lineCol * 0.3, base, line);
        float dist = length(vUv - 0.5) * 2.0;
        col *= (1.0 - dist * 0.7);
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.userData.isGround = true;
  scene.add(ground);
}

// Market stalls
const neonColors = [0xff0088, 0x00ffaa, 0x00aaff, 0xff8800, 0xaa00ff, 0xffff00];
for (let s = 0; s < 12; s++) {
  const angle = (s / 12) * Math.PI * 2;
  const r = 12 + (s % 3) * 3;
  const sx = Math.cos(angle) * r;
  const sz = Math.sin(angle) * r;
  
  const stallGroup = new THREE.Group();
  const color = neonColors[s % neonColors.length];
  
  // Stall frame
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.8, metalness: 0.3 });
  stallGroup.add(new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2), frameMat));
  
  // Supports
  [[-1.3, -0.8], [1.3, -0.8], [-1.3, 0.8], [1.3, 0.8]].forEach(([lx, lz]) => {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3, 6), frameMat);
    pole.position.set(lx, 1.5, lz);
    stallGroup.add(pole);
  });
  
  // Canopy with neon edge
  const canopyGeo = new THREE.PlaneGeometry(3.5, 2.5);
  const canopyMat = new THREE.MeshStandardMaterial({ color: 0x0a0a15, roughness: 0.9 });
  const canopy = new THREE.Mesh(canopyGeo, canopyMat);
  canopy.position.y = 3;
  canopy.rotation.x = -Math.PI * 0.1;
  stallGroup.add(canopy);
  
  // Neon sign
  const signGeo = new THREE.PlaneGeometry(2.5, 0.6);
  const signMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 2.0 });
  const sign = new THREE.Mesh(signGeo, signMat);
  sign.position.set(0, 2.2, 0.3);
  sign.userData.isNeon = true;
  stallGroup.add(sign);
  
  // Glow light
  const glow = new THREE.PointLight(color, 2.5, 8);
  glow.position.set(0, 2.5, 0);
  stallGroup.add(glow);
  
  // Products on stall
  for (let p = 0; p < 6; p++) {
    const px = -1 + (p % 3) * 0.8;
    const pz = -0.5 + Math.floor(p / 3) * 0.6;
    const prod = new THREE.Mesh(
      new THREE.BoxGeometry(0.4 + Math.random() * 0.3, 0.3 + Math.random() * 0.4, 0.3 + Math.random() * 0.3),
      new THREE.MeshStandardMaterial({ color: neonColors[(s + p) % neonColors.length], emissive: neonColors[(s + p) % neonColors.length], emissiveIntensity: 0.3 })
    );
    prod.position.set(px, 0.25, pz);
    stallGroup.add(prod);
  }
  
  stallGroup.position.set(sx, 0, sz);
  stallGroup.rotation.y = angle + Math.PI / 2;
  scene.add(stallGroup);
}

// Holographic billboard
{
  const billboardGroup = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, metalness: 0.5, roughness: 0.5 });
  
  billboardGroup.add(new THREE.Mesh(new THREE.BoxGeometry(10, 6, 0.3), frameMat));
  
  const screenGeo = new THREE.PlaneGeometry(9.5, 5.5);
  const screenMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      void main() {
        float scan = sin(vUv.y * 50.0 + uTime * 5.0) * 0.1 + 0.9;
        float flicker = step(0.97, fract(uTime * 0.5 + vUv.x * 3.0)) * 0.3 + 0.7;
        float g = sin(vUv.x * 10.0 + uTime) * sin(vUv.y * 8.0 + uTime * 1.5) * 0.5 + 0.5;
        vec3 col = vec3(0.0, 0.8, 1.0) * g * scan * flicker;
        col += vec3(1.0, 0.0, 0.5) * smoothstep(0.3, 0.35, vUv.x) * smoothstep(0.4, 0.35, vUv.x) * 0.5;
        gl_FragColor = vec4(col, 0.9);
      }
    `,
    transparent: true
  });
  const screen = new THREE.Mesh(screenGeo, screenMat);
  screen.position.z = 0.2;
  screen.userData.isScreen = true;
  billboardGroup.add(screen);
  
  // Pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 8, 8), frameMat);
  pole.position.y = -7;
  billboardGroup.add(pole);
  
  billboardGroup.position.set(0, 10, -20);
  billboardGroup.userData.isBillboard = true;
  scene.add(billboardGroup);
}

// Floating drones
for (let d = 0; d < 8; d++) {
  const droneGroup = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.6, roughness: 0.4 });
  
  droneGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), bodyMat));
  
  // Arms
  for (let a = 0; a < 4; a++) {
    const armAngle = (a / 4) * Math.PI * 2;
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.05), bodyMat);
    arm.position.set(Math.cos(armAngle) * 0.3, 0, Math.sin(armAngle) * 0.3);
    arm.rotation.y = armAngle;
    droneGroup.add(arm);
    
    // Propeller glow
    const prop = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.05, 8), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2.0 }));
    prop.position.set(Math.cos(armAngle) * 0.6, 0.1, Math.sin(armAngle) * 0.6);
    droneGroup.add(prop);
  }
  
  // Eye glow
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xff0044, emissiveIntensity: 3.0 }));
  eye.position.z = 0.3;
  droneGroup.add(eye);
  
  droneGroup.position.set((Math.random() - 0.5) * 40, 8 + Math.random() * 8, (Math.random() - 0.5) * 40);
  droneGroup.userData = { baseY: droneGroup.position.y, phase: Math.random() * Math.PI * 2 };
  scene.add(droneGroup);
}

// Rain
{
  const rainCount = 3000;
  const rainPos = new Float32Array(rainCount * 3);
  const rainVel = new Float32Array(rainCount);
  for (let i = 0; i < rainCount; i++) {
    rainPos[i*3] = (Math.random() - 0.5) * 80;
    rainPos[i*3+1] = Math.random() * 40;
    rainPos[i*3+2] = (Math.random() - 0.5) * 80;
    rainVel[i] = 0.2 + Math.random() * 0.3;
  }
  const rainGeo = new THREE.BufferGeometry();
  rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
  const rainMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `uniform float uTime; attribute float vel; void main() { vec3 p = position; p.y = mod(p.y - uTime * vel * 15.0, 40.0); gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0); gl_PointSize = 1.5; }`,
    fragmentShader: `void main() { float d = length(gl_PointCoord - 0.5); if (d > 0.5) discard; gl_FragColor = vec4(0.5, 0.7, 1.0, 0.4); }`,
    transparent: true, depthWrite: false
  });
  const rain = new THREE.Points(rainGeo, rainMat);
  rain.userData.vel = rainVel;
  rain.userData.isRain = true;
  scene.add(rain);
}

// Neon reflections on wet ground
{
  const reflectCount = 100;
  const reflectPos = new Float32Array(reflectCount * 3);
  for (let i = 0; i < reflectCount; i++) {
    reflectPos[i*3] = (Math.random() - 0.5) * 40;
    reflectPos[i*3+1] = 0.02;
    reflectPos[i*3+2] = (Math.random() - 0.5) * 40;
  }
  const reflectGeo = new THREE.BufferGeometry();
  reflectGeo.setAttribute('position', new THREE.BufferAttribute(reflectPos, 3));
  const reflectMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `uniform float uTime; void main() { gl_PointSize = 20.0; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `uniform float uTime; void main() { float d = length(gl_PointCoord - 0.5); if (d > 0.5) discard; float a = (1.0 - d * 2.0) * 0.15; vec3 col = vec3(0.0, 1.0, 0.8); gl_FragColor = vec4(col, a); }`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const reflections = new THREE.Points(reflectGeo, reflectMat);
  reflections.userData.isReflections = true;
  scene.add(reflections);
}

// Skyline buildings
for (let b = 0; b < 20; b++) {
  const angle = (b / 20) * Math.PI * 2;
  const r = 40 + Math.random() * 15;
  const height = 8 + Math.random() * 20;
  const bGeo = new THREE.BoxGeometry(3 + Math.random() * 4, height, 3 + Math.random() * 4);
  const bMat = new THREE.MeshStandardMaterial({ color: 0x0a0a15, roughness: 0.8, metalness: 0.3 });
  const building = new THREE.Mesh(bGeo, bMat);
  building.position.set(Math.cos(angle) * r, height / 2, Math.sin(angle) * r);
  scene.add(building);
  
  // Window lights
  for (let w = 0; w < 8; w++) {
    if (Math.random() > 0.6) continue;
    const winMat = new THREE.MeshStandardMaterial({ color: neonColors[Math.floor(Math.random() * neonColors.length)], emissive: neonColors[Math.floor(Math.random() * neonColors.length)], emissiveIntensity: 2.0 });
    const win = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.3), winMat);
    const side = Math.floor(Math.random() * 4);
    const wh = Math.random() * height * 0.8;
    const ww = (Math.random() - 0.5) * 3;
    if (side === 0) { win.position.set(ww, wh, 1.7); }
    else if (side === 1) { win.position.set(ww, wh, -1.7); win.rotation.y = Math.PI; }
    else if (side === 2) { win.position.set(1.7, wh, ww); win.rotation.y = Math.PI / 2; }
    else { win.position.set(-1.7, wh, ww); win.rotation.y = -Math.PI / 2; }
    building.add(win);
  }
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  scene.traverse(obj => {
    if (obj.userData.isGround && obj.material?.uniforms?.uTime) obj.material.uniforms.uTime.value = t;
    if (obj.userData.isNeon) obj.material.emissiveIntensity = 1.5 + Math.sin(t * 4) * 0.5;
    if (obj.userData.isScreen && obj.material?.uniforms?.uTime) obj.material.uniforms.uTime.value = t;
    if (obj.userData.isRain) obj.material.uniforms.uTime.value = t;
    if (obj.userData.isReflections) obj.material.uniforms.uTime.value = t;
    if (obj.userData.baseY !== undefined) {
      obj.position.y = obj.userData.baseY + Math.sin(t * 2 + obj.userData.phase) * 0.5;
    }
  });
  
  controls.update();
  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
